<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <title>Programa Web</title>
</head>
<body>

    <h1>Menú Multifuncional</h1>

    <div class="contenedor">

        <div class="card">
            <h2>Calculadora</h2>
            <form method="POST">
                <input type="hidden" name="opcion" value="calculadora">
                <input type="number" step="any" name="numero1" placeholder="Número 1" required>
                <input type="number" step="any" name="numero2" placeholder="Número 2" required>

                <select name="operacion">
                    <option value="sumar">Sumar</option>
                    <option value="restar">Restar</option>
                    <option value="multiplicar">Multiplicar</option>
                    <option value="dividir">Dividir</option>
                </select>

                <button type="submit">Calcular</button>
            </form>
        </div>

        <div class="card">
            <h2>Conversor USD a COP</h2>
            <form method="POST">
                <input type="hidden" name="opcion" value="moneda">
                <input type="number" step="any" name="dolares" placeholder="Dólares" required>
                <button type="submit">Convertir</button>
            </form>
        </div>

    </div>

    {% if resultado %}
        <div class="resultado">
            <h2>Resultado:</h2>
            <p>{{ resultado }}</p>
        </div>
    {% endif %}

</body>
</html>
